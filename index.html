<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ms Seafood Boil POS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>
<body>

<header>
  <img src="logo.jpeg" alt="Ms Seafood Boil Logo" class="logo">
  <h1>Ms Seafood Boil POS</h1>
  <p>Pickup: 311 Naledi Street, Tembisa | Call: 061 186 9463</p>
</header>

<main>

  <!-- Customer Info -->
  <section class="customer-info">
    <h2>Customer Info</h2>
    <input type="text" id="customer-name" placeholder="Full Name">
    <input type="text" id="customer-phone" placeholder="Phone Number">
    <input type="text" id="customer-area" placeholder="Area">
  </section>

  <!-- Menu Selection -->
  <section class="menu-selection">
    <h2>Add Menu Item</h2>

    <select id="menu-dropdown">
      <option value="">Select item</option>
    </select>

    <input type="number" id="menu-qty" placeholder="Quantity" min="1" value="1">

    <button id="add-to-cart">Add to Cart</button>

  </section>

  <!-- Cart Table -->
  <section class="cart">

    <h2>Cart</h2>

    <table id="cart-table">

      <thead>
        <tr>
          <th>Item</th>
          <th>Qty</th>
          <th>Total</th>
          <th>Collected?</th>
        </tr>
      </thead>

      <tbody id="cart-items">
        <tr><td colspan="4">No items added</td></tr>
      </tbody>

    </table>

    <p class="total">Total: R0</p>

    <button id="checkout">Checkout</button>

  </section>

  <!-- Expenses Section -->
  <section class="expenses">

    <h2>Expenses</h2>

    <input type="text" id="expense-description" placeholder="Description">

    <input type="number" id="expense-amount" placeholder="Amount" min="0">

    <!-- FIXED ID -->
    <select id="expense-type">
      <option value="">Select Category</option>
      <option value="Stock">Stock</option>
      <option value="Salary">Salary</option>
      <option value="Other">Other</option>
    </select>

    <button id="add-expense">Add Expense</button>

    <p class="expenses-total">Total Expenses: R0</p>

  </section>

  <!-- Profit Summary -->
  <section class="reports">

    <h2>Profit & Reports</h2>

    <p class="sales-total">Total Sales: R0</p>

    <p class="profit-total">Profit: R0</p>

    <select id="report-filter">
      <option value="today">Today</option>
      <option value="last7">Last 7 Days</option>
      <option value="month">This Month</option>
      <option value="all">All Time</option>
    </select>

    <button id="download-report">Download PDF Report</button>

  </section>

</main>

<script src="app.js"></script>

</body>
</html>
